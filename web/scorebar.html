<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLDR Score Bar</title>
    <style>
      :root {
        --teal-a: #15d7ff;
        --teal-b: #7cf8ff;
        --teal-c: #1ad4d8;
        --gold-a: #ffd44f;
        --gold-b: #ff9f1f;
        --gold-c: #ffe266;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        overflow: hidden;
      }

      .bar-shell {
        width: 100%;
        height: 100%;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
      }

      .bar-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background-size: 220% 100%;
        background-image: linear-gradient(110deg, var(--teal-a), var(--teal-b), var(--teal-c), var(--teal-a));
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.38) inset;
        animation: gradientShift 2.2s linear infinite;
        transition: width 420ms cubic-bezier(0.2, 0.7, 0, 1);
      }

      .bar-fill.is-perfect {
        background-image: linear-gradient(110deg, var(--gold-a), var(--gold-c), var(--gold-b), var(--gold-a));
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.42) inset,
          0 0 16px rgba(255, 172, 57, 0.44);
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 220% 50%;
        }
      }
    </style>
    <script defer>
      (() => {
        "use strict";

        function normalizePercent(rawValue) {
          let parsed = Number(rawValue);
          if (!Number.isFinite(parsed)) {
            parsed = 0;
          }
          if (parsed > 0 && parsed <= 1) {
            parsed = parsed * 100;
          }
          if (parsed < 0) {
            parsed = 0;
          }
          if (parsed > 100) {
            parsed = 100;
          }
          return parsed;
        }

        function boot() {
          const q = new URLSearchParams(window.location.search);
          const percentValue = normalizePercent(q.get("percent"));
          const isPerfect = percentValue >= 100;

          const barNode = document.getElementById("scoreBar");
          if (!barNode) {
            return;
          }
          barNode.style.width = percentValue.toFixed(3) + "%";
          if (isPerfect) {
            barNode.classList.add("is-perfect");
          } else {
            barNode.classList.remove("is-perfect");
          }
        }

        window.addEventListener("DOMContentLoaded", boot);
      })();
    </script>
  </head>
  <body>
    <div class="bar-shell">
      <div id="scoreBar" class="bar-fill"></div>
    </div>
  </body>
</html>
