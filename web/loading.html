<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLDR Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
    <script src="./assets/common.js" defer></script>
    <style>
      :root {
        --bg: #f6fcff;
        --ink: #0e2a35;
        --teal: #1ad4d8;
        --pink: #ff4f9a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--ink);
        font-family: "Rajdhani", "Segoe UI", sans-serif;
        background:
          radial-gradient(90vmax 70vmax at -8% 105%, rgba(26, 212, 216, 0.22), transparent 62%),
          radial-gradient(92vmax 60vmax at 108% -6%, rgba(255, 79, 154, 0.2), transparent 64%),
          linear-gradient(160deg, #fdfeff, #f3fbff 46%, #fdf8ff);
      }

      .panel {
        width: min(860px, 100%);
        border: 1px solid #cde7ef;
        border-radius: 20px;
        padding: clamp(18px, 4vw, 34px);
        background: linear-gradient(130deg, rgba(255, 255, 255, 0.96), rgba(246, 253, 255, 0.9));
        box-shadow: 0 16px 42px rgba(36, 108, 133, 0.13);
        text-align: center;
      }

      h1 {
        margin: 0;
        font: 800 clamp(34px, 7vw, 72px) "Orbitron", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #0b4758;
      }

      p {
        margin: 8px 0 0;
        font: 700 clamp(18px, 3.4vw, 30px) "Rajdhani", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #236275;
      }

      .bar {
        margin: 22px auto 0;
        width: min(520px, 100%);
        height: 10px;
        border-radius: 999px;
        background: #e5f6fa;
        overflow: hidden;
      }

      .bar::before {
        content: "";
        display: block;
        width: 32%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--teal), var(--pink));
        animation: loadSweep 1.05s ease-in-out infinite;
      }

      @keyframes loadSweep {
        0% {
          transform: translateX(-110%);
        }
        50% {
          transform: translateX(200%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      .screen-wipe {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 9999;
      }

      .screen-wipe.is-holding {
        background: #ffffff;
      }

      .screen-wipe::before {
        content: "";
        position: absolute;
        width: 230vmax;
        height: 230vmax;
        left: 50%;
        top: 50%;
        background: #ffffff;
        transform: translate(0%, 0%) rotate(-45deg);
      }

      .screen-wipe.is-revealing::before {
        animation: screenRevealDiagonal 1.25s cubic-bezier(0.2, 0.7, 0, 1) forwards;
      }

      @keyframes screenRevealDiagonal {
        0% {
          transform: translate(0%, 0%) rotate(-45deg);
        }
        100% {
          transform: translate(-120%, -120%) rotate(-45deg);
        }
      }
    </style>
    <script defer>
      (() => {
        "use strict";

        const REVEAL_DELAY_MS = 2000;

        function startLoadReveal() {
          const wipe = document.getElementById("screenWipe");
          if (!wipe) {
            return;
          }
          wipe.classList.remove("is-revealing");
          void wipe.offsetWidth;
          wipe.classList.add("is-revealing");
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              wipe.classList.remove("is-holding");
            });
          });
        }

        function setSongLabelFromQuery() {
          const q = SLDR.query();
          const title = SLDR.getParam(q, "title", "");
          const difficulty = SLDR.getParam(q, "difficulty", "");
          const songLabel = document.getElementById("songLabel");
          if (!songLabel) {
            return;
          }
          if (title && difficulty) {
            songLabel.textContent = `${title} - ${difficulty}`;
            return;
          }
          if (title) {
            songLabel.textContent = title;
            return;
          }
          songLabel.textContent = "Preparing Chart";
        }

        window.addEventListener("DOMContentLoaded", () => {
          setSongLabelFromQuery();
          window.setTimeout(startLoadReveal, REVEAL_DELAY_MS);
        });
      })();
    </script>
  </head>
  <body>
    <section class="panel" aria-live="polite">
      <h1>Loading</h1>
      <p id="songLabel">Preparing Chart</p>
      <div class="bar"></div>
    </section>
    <div id="screenWipe" class="screen-wipe is-holding" aria-hidden="true"></div>
  </body>
</html>
