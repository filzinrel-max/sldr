<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLDR Chart Tester</title>
    <link rel="stylesheet" href="./assets/chart-tester.css" />
    <script src="./assets/chart-tester.js" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>SLDR Chart Tester</h1>
        <p>Local condensed chart preview for chunked `delta,press,start,end` payloads.</p>
      </header>

      <section class="controls">
        <div class="field-group">
          <label for="songSelect">Song</label>
          <select id="songSelect"></select>
        </div>
        <div class="field-group">
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect"></select>
        </div>
        <button id="loadFromManifestBtn" type="button">Load Selected</button>
      </section>

      <section class="controls">
        <div class="field-group chart-path-group">
          <label for="chartPathInput">Chart Index Path</label>
          <input id="chartPathInput" type="text" value="game-data/charts/waka-laka/easy.chart.idx.json" />
        </div>
        <button id="loadByPathBtn" type="button">Load Path</button>
      </section>

      <section class="playback">
        <button id="playPauseBtn" type="button">Play</button>
        <button id="restartBtn" type="button">Restart</button>
        <div class="field-group slider-group">
          <label for="timeRange">Time</label>
          <input id="timeRange" type="range" min="0" max="1" step="0.001" value="0" />
        </div>
        <div class="field-group slider-group">
          <label for="speedRange">Scroll Speed</label>
          <input id="speedRange" type="range" min="120" max="720" step="10" value="340" />
          <span id="speedValue" class="value-pill">340 px/s</span>
        </div>
      </section>

      <section class="status-row">
        <p id="statusText" class="status">Ready.</p>
        <div class="stats">
          <span class="stat">Duration <strong id="durationValue">0.00s</strong></span>
          <span class="stat">Notes <strong id="notesValue">0</strong></span>
          <span class="stat">Holds <strong id="holdsValue">0</strong></span>
          <span class="stat">Events <strong id="eventsValue">0</strong></span>
          <span class="stat">Time <strong id="timeValue">0.00s</strong></span>
        </div>
      </section>

      <section class="chart-shell">
        <canvas id="chartCanvas" width="1280" height="720"></canvas>
      </section>

      <section class="debug">
        <h2>Decoded Event Preview</h2>
        <pre id="eventPreview">Load a chart to inspect decoded condensed rows.</pre>
      </section>
    </main>
  </body>
</html>
