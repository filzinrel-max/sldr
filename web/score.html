<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLDR Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
    <script src="./assets/common.js" defer></script>
    <style>
      :root {
        --ink: #0e2a35;
        --muted: #5a7b86;
        --line: #cde7ef;
        --teal: #1ad4d8;
        --teal-strong: #00aeb7;
        --pink: #ff4f9a;
        --ok: #00a66a;
        --warn: #ff8d42;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        font-family: "Rajdhani", "Segoe UI", sans-serif;
        background:
          radial-gradient(100vmax 70vmax at -10% 115%, rgba(26, 212, 216, 0.22), transparent 60%),
          radial-gradient(90vmax 60vmax at 110% -5%, rgba(255, 79, 154, 0.2), transparent 64%),
          linear-gradient(160deg, #fdfeff, #f3fbff 46%, #fdf8ff);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.022) 0,
            rgba(0, 0, 0, 0.022) 2px,
            transparent 2px,
            transparent 7px
          );
        mix-blend-mode: soft-light;
        opacity: 0.48;
      }

      .score-root {
        position: relative;
        min-height: 100vh;
        padding: clamp(12px, 2.7vw, 30px);
        display: grid;
        gap: 12px;
      }

      .topbar {
        width: min(1320px, 100%);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(120deg, rgba(255, 255, 255, 0.95), rgba(246, 253, 255, 0.86));
        padding: 10px clamp(12px, 2vw, 20px);
        box-shadow: 0 10px 32px rgba(36, 108, 133, 0.11);
        display: grid;
        gap: 4px;
      }

      .top-kicker {
        margin: 0;
        font: 700 13px "Rajdhani", sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .top-title {
        margin: 0;
        font: 800 clamp(28px, 4.8vw, 48px) "Orbitron", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--teal-strong);
        text-shadow: 0 0 14px rgba(26, 212, 216, 0.32);
      }

      .song-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 12px;
        background: #ffffff;
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .pill .pill-label {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .pill strong {
        color: var(--ink);
        margin-left: 0;
        font: 800 clamp(18px, 2.4vw, 24px) "Rajdhani", sans-serif;
        line-height: 1;
        letter-spacing: 0.02em;
      }

      .pill.artist strong {
        max-width: min(52vw, 520px);
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-layout {
        width: min(1320px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(320px, 54%) minmax(280px, 46%);
        gap: clamp(12px, 2.2vw, 24px);
      }

      .score-layout > * {
        min-width: 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.96), rgba(244, 252, 255, 0.9));
        box-shadow: 0 16px 42px rgba(36, 108, 133, 0.12);
        padding: clamp(12px, 2vw, 18px);
      }

      .panel-kicker {
        margin: 0;
        font: 700 14px "Rajdhani", sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .grade-row {
        display: grid;
        grid-template-columns: minmax(130px, 200px) minmax(200px, 1fr);
        gap: 12px;
        align-items: end;
      }

      .grade-value {
        margin: 0;
        line-height: 0.88;
        font: 800 clamp(84px, 15vw, 180px) "Orbitron", sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: transparent;
        background: linear-gradient(180deg, #17d4d8 0%, #00afb7 45%, #ff4f9a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(26, 212, 216, 0.24),
          0 0 16px rgba(255, 79, 154, 0.18);
      }

      .grade-value[data-letter="A"] {
        background: linear-gradient(180deg, #15d977 0%, #00b863 60%, #00a653 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(21, 217, 119, 0.28),
          0 0 18px rgba(0, 184, 99, 0.22);
      }

      .grade-value[data-letter="B"] {
        background: linear-gradient(180deg, #17d4d8 0%, #00afb7 45%, #3d8fff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(23, 212, 216, 0.28),
          0 0 18px rgba(61, 143, 255, 0.2);
      }

      .grade-value[data-letter="C"] {
        background: linear-gradient(180deg, #ffd86b 0%, #ffb74d 50%, #ff9457 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(255, 216, 107, 0.28),
          0 0 18px rgba(255, 148, 87, 0.22);
      }

      .grade-value[data-letter="D"] {
        background: linear-gradient(180deg, #ffb76b 0%, #ff9457 48%, #ff6e6e 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(255, 183, 107, 0.28),
          0 0 18px rgba(255, 110, 110, 0.24);
      }

      .grade-value[data-letter="E"],
      .grade-value[data-letter="F"] {
        background: linear-gradient(180deg, #ff8aa9 0%, #ff5f8f 42%, #ff4f9a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 10px rgba(255, 95, 143, 0.28),
          0 0 18px rgba(255, 79, 154, 0.24);
      }

      .kv-grid {
        display: grid;
        gap: 8px;
      }

      .kv {
        border: 1px solid #c8e4ed;
        border-radius: 12px;
        background: #ffffff;
        padding: 8px 10px;
        display: grid;
        gap: 1px;
      }

      .kv .k {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .kv .v {
        color: var(--ink);
        font: 800 clamp(24px, 3.2vw, 36px) "Orbitron", sans-serif;
        line-height: 1;
        letter-spacing: 0.03em;
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, #b8dce8 14%, #b8dce8 86%, transparent);
        margin: 12px 0;
      }

      .judge-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .judge {
        border: 1px solid #c8e4ed;
        border-radius: 12px;
        background: #ffffff;
        padding: 7px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .judge .name {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .judge .count {
        color: var(--ink);
        font: 800 25px "Orbitron", sans-serif;
        line-height: 1;
      }

      .radar-wrap {
        border: 1px solid #d6ebf2;
        border-radius: 14px;
        background:
          radial-gradient(90% 40% at 50% 18%, rgba(26, 212, 216, 0.16), transparent 72%),
          radial-gradient(90% 45% at 50% 88%, rgba(255, 79, 154, 0.14), transparent 74%),
          linear-gradient(180deg, #fbfeff, #f2fbff);
        min-height: min(56vh, 480px);
        padding: 8px;
      }

      #radar {
        width: 100%;
        height: min(52vh, 440px);
        display: block;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
        color: var(--muted);
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }

      .back-link {
        border: 1px solid #f06da9;
        border-radius: 999px;
        min-height: 38px;
        padding: 0 18px;
        background: linear-gradient(110deg, #17d4d8, #ff5ea5);
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        font: 800 clamp(15px, 2.1vw, 20px) "Rajdhani", sans-serif;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        text-decoration: none;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.42) inset,
          0 10px 22px rgba(240, 109, 169, 0.28);
      }

      .back-link:hover {
        filter: brightness(1.04);
      }

      .song-row .back-link {
        margin-left: auto;
      }

      .screen-wipe {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 9999;
      }

      .screen-wipe.is-holding {
        background: #ffffff;
      }

      .screen-wipe::before {
        content: "";
        position: absolute;
        width: 230vmax;
        height: 230vmax;
        left: 50%;
        top: 50%;
        background: #ffffff;
        transform: translate(0%, 0%) rotate(-45deg);
      }

      .screen-wipe.is-revealing::before {
        animation: screenRevealDiagonal 1.25s cubic-bezier(0.2, 0.7, 0, 1) forwards;
      }

      @keyframes screenRevealDiagonal {
        0% {
          transform: translate(0%, 0%) rotate(-45deg);
        }
        100% {
          transform: translate(-120%, -120%) rotate(-45deg);
        }
      }

      @media (max-width: 1020px) {
        .score-layout {
          grid-template-columns: 1fr;
        }

        .grade-row {
          grid-template-columns: minmax(120px, 170px) 1fr;
        }

        .radar-wrap {
          min-height: min(50vh, 420px);
        }

        #radar {
          height: min(46vh, 380px);
        }
      }

      @media (max-width: 640px) {
        .judge-grid {
          grid-template-columns: 1fr;
        }

        .kv .v {
          font-size: 30px;
        }

        .song-row .back-link {
          margin-left: 0;
        }
      }
    </style>
    <script defer>
      (() => {
        "use strict";

        const REVEAL_DELAY_MS = 2000;
        const SCORE_COUNTUP_MS = 1100;
        let gIntroMusicAudio = null;
        let gIntroUnlockBound = false;
        let gIntroPrimeTried = false;

        function initIntroMusicAudio() {
          gIntroMusicAudio = new Audio("./assets/intro_music.mp3");
          gIntroMusicAudio.preload = "auto";
          gIntroMusicAudio.loop = true;
          gIntroMusicAudio.volume = 0.75;
          gIntroMusicAudio.playsInline = true;
        }

        function onIntroUnlock() {
          playIntroMusic();
        }

        function bindIntroUnlock() {
          if (gIntroUnlockBound) {
            return;
          }
          gIntroUnlockBound = true;
          window.addEventListener("pointerdown", onIntroUnlock, { passive: true });
          window.addEventListener("touchstart", onIntroUnlock, { passive: true });
          window.addEventListener("mousedown", onIntroUnlock, { passive: true });
          window.addEventListener("keydown", onIntroUnlock);
          window.addEventListener("focus", onIntroUnlock);
        }

        function playIntroMusic() {
          if (!gIntroMusicAudio) {
            return;
          }
          if (!gIntroMusicAudio.paused) {
            if (!gIntroMusicAudio.muted) {
              return;
            }
          }

          gIntroMusicAudio.muted = false;

          try {
            const playResult = gIntroMusicAudio.play();
            if (playResult && typeof playResult.then === "function") {
              playResult.catch(() => {
                bindIntroUnlock();
              });
              return;
            }
            if (playResult && typeof playResult.catch === "function") {
              playResult.catch(() => {
                bindIntroUnlock();
              });
            }
          } catch (_err) {
            bindIntroUnlock();
          }

          if (gIntroPrimeTried) {
            return;
          }
          gIntroPrimeTried = true;

          try {
            gIntroMusicAudio.muted = true;
            const primeResult = gIntroMusicAudio.play();
            if (primeResult && typeof primeResult.catch === "function") {
              primeResult.catch(() => {});
            }
          } catch (_err) {
            // Ignore; unmuted retries continue on user interaction.
          }
        }

        function startLoadReveal() {
          const wipe = document.getElementById("screenWipe");
          if (!wipe) {
            return;
          }
          wipe.classList.remove("is-revealing");
          void wipe.offsetWidth;
          wipe.classList.add("is-revealing");
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              wipe.classList.remove("is-holding");
            });
          });
        }

        function fallbackResult() {
          return {
            title: "No Result Payload",
            artist: "N/A",
            difficulty: "-",
            meter: 0,
            score: 0,
            percent: 0,
            grade: "F",
            comboMax: 0,
            judgements: { perfect: 0, great: 0, good: 0, boo: 0, miss: 0 },
            holds: { ok: 0, ng: 0 },
            radar: {
              song: [0, 0, 0, 0, 0],
              performance: [0, 0, 0, 0, 0]
            }
          };
        }

        function parseRadarCsv(text) {
          const values = [];
          const raw = String(text || "");
          const parts = raw ? raw.split(",") : [];
          let i = 0;
          for (; i < 5; i += 1) {
            values.push(SLDR.toNumber(parts[i], 0));
          }
          return values;
        }

        function loadResultFromCompactQuery(query) {
          if (!query || !(query.has("sid") || query.has("score") || query.has("pct") || query.has("title"))) {
            return null;
          }

          return {
            songId: SLDR.getParam(query, "sid", ""),
            title: SLDR.getParam(query, "title", "Unknown Song"),
            artist: SLDR.getParam(query, "artist", "Unknown Artist"),
            difficulty: SLDR.getParam(query, "diff", "-"),
            meter: SLDR.toNumber(SLDR.getParam(query, "meter", "0"), 0),
            score: SLDR.toNumber(SLDR.getParam(query, "score", "0"), 0),
            percent: SLDR.toNumber(SLDR.getParam(query, "pct", "0"), 0),
            grade: SLDR.getParam(query, "grade", "F"),
            comboMax: SLDR.toNumber(SLDR.getParam(query, "combo", "0"), 0),
            judgements: {
              perfect: SLDR.toNumber(SLDR.getParam(query, "jp", "0"), 0),
              great: SLDR.toNumber(SLDR.getParam(query, "jg", "0"), 0),
              good: SLDR.toNumber(SLDR.getParam(query, "jd", "0"), 0),
              boo: SLDR.toNumber(SLDR.getParam(query, "jb", "0"), 0),
              miss: SLDR.toNumber(SLDR.getParam(query, "jm", "0"), 0)
            },
            holds: {
              ok: SLDR.toNumber(SLDR.getParam(query, "hok", "0"), 0),
              ng: SLDR.toNumber(SLDR.getParam(query, "hng", "0"), 0)
            },
            radar: {
              song: parseRadarCsv(SLDR.getParam(query, "rs", "0,0,0,0,0")),
              performance: parseRadarCsv(SLDR.getParam(query, "rp", "0,0,0,0,0"))
            }
          };
        }

        function loadResultFromQuery() {
          const q = SLDR.query();
          const raw = SLDR.getParam(q, "result", "");
          const parsed = SLDR.decodeMaybeJson(raw);
          if (parsed && typeof parsed === "object") {
            return parsed;
          }
          const compact = loadResultFromCompactQuery(q);
          if (compact) {
            return compact;
          }
          return fallbackResult();
        }

        function setCount(id, value) {
          SLDR.setText(id, String(SLDR.toNumber(value, 0)));
        }

        function easeOutCubic(t) {
          const x = 1 - t;
          return 1 - x * x * x;
        }

        function animateValue(id, startValue, endValue, durationMs, formatter) {
          const node = document.getElementById(id);
          if (!node) {
            return;
          }

          const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          if (prefersReducedMotion || durationMs <= 0) {
            node.textContent = formatter(endValue);
            return;
          }

          const start = performance.now();
          const delta = endValue - startValue;

          function step(nowMs) {
            const elapsed = nowMs - start;
            let t = elapsed / durationMs;
            if (t < 0) {
              t = 0;
            }
            if (t > 1) {
              t = 1;
            }

            const eased = easeOutCubic(t);
            const value = startValue + delta * eased;
            node.textContent = formatter(value);

            if (t < 1) {
              window.requestAnimationFrame(step);
            } else {
              node.textContent = formatter(endValue);
            }
          }

          window.requestAnimationFrame(step);
        }

        function animateSummaryNumbers(scoreValue, percentValue, comboValue) {
          animateValue(
            "score",
            0,
            scoreValue,
            SCORE_COUNTUP_MS,
            (value) => {
              return String(Math.round(value));
            }
          );

          animateValue(
            "percent",
            0,
            percentValue,
            SCORE_COUNTUP_MS,
            (value) => {
              return Number(value).toFixed(2) + "%";
            }
          );

          animateValue(
            "combo",
            0,
            comboValue,
            SCORE_COUNTUP_MS,
            (value) => {
              return String(Math.round(value));
            }
          );
        }

        function radarNormalize(values, length) {
          const out = [];
          let i = 0;
          for (; i < length; i += 1) {
            const raw = Array.isArray(values) ? Number(values[i]) : 0;
            if (!Number.isFinite(raw)) {
              out.push(0);
            } else if (raw < 0) {
              out.push(0);
            } else if (raw > 1) {
              out.push(1);
            } else {
              out.push(raw);
            }
          }
          return out;
        }

        function drawRadarLight(canvas, songData, perfData) {
          if (!canvas || !canvas.getContext) {
            return;
          }

          const ctx = canvas.getContext("2d");
          const dpr = window.devicePixelRatio || 1;
          const width = canvas.clientWidth || 420;
          const height = canvas.clientHeight || 420;
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const cx = width * 0.5;
          const cy = height * 0.5;
          const radius = Math.min(width, height) * 0.34;
          const labels = ["Stream", "Voltage", "Air", "Freeze", "Chaos"];
          const rings = 5;
          const axisCount = labels.length;

          ctx.clearRect(0, 0, width, height);
          ctx.lineWidth = 1;
          ctx.strokeStyle = "rgba(43, 91, 109, 0.30)";

          let ring = 1;
          for (; ring <= rings; ring += 1) {
            const r = (radius * ring) / rings;
            ctx.beginPath();
            let i = 0;
            for (; i < axisCount; i += 1) {
              const angle = -Math.PI / 2 + (Math.PI * 2 * i) / axisCount;
              const x = cx + Math.cos(angle) * r;
              const y = cy + Math.sin(angle) * r;
              if (i === 0) {
                ctx.moveTo(x, y);
              } else {
                ctx.lineTo(x, y);
              }
            }
            ctx.closePath();
            ctx.stroke();
          }

          let i = 0;
          for (; i < axisCount; i += 1) {
            const angle = -Math.PI / 2 + (Math.PI * 2 * i) / axisCount;
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(x, y);
            ctx.stroke();

            const lx = cx + Math.cos(angle) * (radius + 22);
            const ly = cy + Math.sin(angle) * (radius + 22);
            ctx.fillStyle = "#2a5d70";
            ctx.font = '700 13px "Rajdhani", sans-serif';
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(labels[i], lx, ly);
          }

          const sets = [
            {
              values: radarNormalize(songData, axisCount),
              stroke: "rgba(255, 79, 154, 0.95)",
              fill: "rgba(255, 79, 154, 0.20)"
            },
            {
              values: radarNormalize(perfData, axisCount),
              stroke: "rgba(26, 212, 216, 0.95)",
              fill: "rgba(26, 212, 216, 0.22)"
            }
          ];

          sets.forEach((set) => {
            ctx.beginPath();
            let j = 0;
            for (; j < axisCount; j += 1) {
              const angle = -Math.PI / 2 + (Math.PI * 2 * j) / axisCount;
              const r = radius * set.values[j];
              const x = cx + Math.cos(angle) * r;
              const y = cy + Math.sin(angle) * r;
              if (j === 0) {
                ctx.moveTo(x, y);
              } else {
                ctx.lineTo(x, y);
              }
            }
            ctx.closePath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = set.stroke;
            ctx.fillStyle = set.fill;
            ctx.fill();
            ctx.stroke();
          });
        }

        function renderRadar(result) {
          const radar = result.radar || {};
          const songData = Array.isArray(radar.song) ? radar.song : [0, 0, 0, 0, 0];
          const perfData = Array.isArray(radar.performance) ? radar.performance : [0, 0, 0, 0, 0];
          drawRadarLight(document.getElementById("radar"), songData, perfData);
        }

        function setBackToSelectLink(result) {
          const link = document.getElementById("backToSelect");
          if (!link) {
            return;
          }

          const params = new URLSearchParams();
          const songId = String(result && result.songId ? result.songId : "");
          const difficulty = String(result && result.difficulty ? result.difficulty : "");
          if (songId) {
            params.set("song", songId);
          }
          if (difficulty) {
            params.set("difficulty", difficulty);
          }
          params.set("ts", String(Date.now()));
          link.href = "./select.html?" + params.toString();
        }

        function boot() {
          window.setTimeout(() => {
            startLoadReveal();
          }, REVEAL_DELAY_MS);
          initIntroMusicAudio();
          bindIntroUnlock();
          playIntroMusic();

          const result = loadResultFromQuery();
          const seed = String(result.songId || "") + ":" + String(result.title || "");
          SLDR.applyThemeSeed(seed);
          setBackToSelectLink(result);

          const grade = String(result.grade || "F").toUpperCase();
          SLDR.setText("title", result.title || "Unknown Song");
          SLDR.setText("artist", result.artist || "Unknown Artist");
          SLDR.setText("difficulty", result.difficulty || "-");
          SLDR.setText("meter", String(SLDR.toNumber(result.meter, 0)));
          animateSummaryNumbers(
            SLDR.toNumber(result.score, 0),
            SLDR.toNumber(result.percent, 0),
            SLDR.toNumber(result.comboMax, 0)
          );
          SLDR.setText("grade", grade);
          SLDR.setAttr("grade", "data-letter", grade);

          const j = result.judgements || {};
          setCount("perfect", j.perfect);
          setCount("great", j.great);
          setCount("good", j.good);
          setCount("boo", j.boo);
          setCount("miss", j.miss);

          const h = result.holds || {};
          setCount("holdOk", h.ok);
          setCount("holdNg", h.ng);

          renderRadar(result);
          window.addEventListener("resize", () => {
            renderRadar(result);
          });
        }

        window.addEventListener("DOMContentLoaded", boot);
      })();
    </script>
  </head>
  <body>
    <main class="score-root">
      <header class="topbar">
        <p class="top-kicker">Dance Results</p>
        <h1 id="title" class="top-title">Song Title</h1>
        <div class="song-row">
          <span class="pill artist"><span class="pill-label">Artist</span><strong id="artist">-</strong></span>
          <span class="pill"><span class="pill-label">Difficulty</span><strong id="difficulty">-</strong></span>
          <span class="pill"><span class="pill-label">Meter</span><strong id="meter">0</strong></span>
          <a id="backToSelect" class="back-link" href="./select.html">Back to Song Select</a>
        </div>
      </header>

      <section class="score-layout">
        <article class="panel">
          <p class="panel-kicker">Grade Summary</p>
          <div class="grade-row">
            <p id="grade" class="grade-value" data-letter="F">F</p>
            <div class="kv-grid">
              <div class="kv">
                <div class="k">Score</div>
                <div class="v" id="score">0</div>
              </div>
              <div class="kv">
                <div class="k">Percent</div>
                <div class="v" id="percent">0.00%</div>
              </div>
              <div class="kv">
                <div class="k">Max Combo</div>
                <div class="v" id="combo">0</div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <p class="panel-kicker">Judgements</p>
          <div class="judge-grid">
            <div class="judge"><div class="name">Perfect</div><div class="count" id="perfect">0</div></div>
            <div class="judge"><div class="name">Great</div><div class="count" id="great">0</div></div>
            <div class="judge"><div class="name">Good</div><div class="count" id="good">0</div></div>
            <div class="judge"><div class="name">Boo</div><div class="count" id="boo">0</div></div>
            <div class="judge"><div class="name">Miss</div><div class="count" id="miss">0</div></div>
            <div class="judge"><div class="name">Hold OK</div><div class="count" id="holdOk">0</div></div>
            <div class="judge"><div class="name">Hold NG</div><div class="count" id="holdNg">0</div></div>
          </div>
        </article>

        <article class="panel">
          <p class="panel-kicker">DDR Radar</p>
          <div class="radar-wrap">
            <canvas id="radar" aria-label="radar chart"></canvas>
          </div>
          <div class="legend">
            <span><span class="dot" style="background: rgba(255, 79, 154, 0.95)"></span>Song Profile</span>
            <span><span class="dot" style="background: rgba(26, 212, 216, 0.95)"></span>Performance</span>
          </div>
        </article>
      </section>

    </main>
    <div id="screenWipe" class="screen-wipe is-holding" aria-hidden="true"></div>
  </body>
</html>
