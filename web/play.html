<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLDR Play</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        overflow: hidden;
      }

      body {
        position: relative;
      }

      #songVideo {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #000000;
      }

      #statusText {
        position: fixed;
        left: 50%;
        bottom: 5.2vh;
        transform: translateX(-50%);
        margin: 0;
        padding: 6px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #ffffff;
        font: 700 20px "Rajdhani", "Segoe UI", sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        display: none;
        z-index: 2;
      }

      .screen-wipe {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 9999;
      }

      .screen-wipe.is-holding {
        background: #ffffff;
      }

      .screen-wipe::before {
        content: "";
        position: absolute;
        width: 230vmax;
        height: 230vmax;
        left: 50%;
        top: 50%;
        background: #ffffff;
        transform: translate(0%, 0%) rotate(-45deg);
      }

      .screen-wipe.is-revealing::before {
        animation: screenRevealDiagonal 1.25s cubic-bezier(0.2, 0.7, 0, 1) forwards;
      }

      @keyframes screenRevealDiagonal {
        0% {
          transform: translate(0%, 0%) rotate(-45deg);
        }
        100% {
          transform: translate(-120%, -120%) rotate(-45deg);
        }
      }
    </style>
    <script defer>
      (() => {
        "use strict";

        const REVEAL_DELAY_MS = 2000;

        function resolveMediaUrl(mediaParam) {
          if (!mediaParam) {
            return "";
          }
          const raw = String(mediaParam).trim();
          if (!raw) {
            return "";
          }
          try {
            if (/^(https?:)?\/\//i.test(raw)) {
              return raw;
            }
            if (raw.indexOf("data:") === 0) {
              return raw;
            }
            if (raw.indexOf("blob:") === 0) {
              return raw;
            }
            const appRoot = new URL("../", window.location.href);
            const normalizedPath = raw.replace(/^\/+/, "").replace(/^\.\//, "");
            return new URL(normalizedPath, appRoot).toString();
          } catch (_err) {
            return raw;
          }
        }

        function startLoadReveal() {
          const wipe = document.getElementById("screenWipe");
          if (!wipe) {
            return;
          }
          wipe.classList.remove("is-revealing");
          void wipe.offsetWidth;
          wipe.classList.add("is-revealing");
          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              wipe.classList.remove("is-holding");
            });
          });
        }

        function showStatus(text) {
          const node = document.getElementById("statusText");
          if (!node) {
            return;
          }
          if (!text) {
            node.style.display = "none";
            node.textContent = "";
            return;
          }
          node.textContent = text;
          node.style.display = "block";
        }

        function boot() {
          window.setTimeout(startLoadReveal, REVEAL_DELAY_MS);

          const q = new URLSearchParams(window.location.search);
          const mediaRaw = q.get("media");
          let media = "";
          if (mediaRaw) {
            media = mediaRaw;
          }
          const mediaUrl = resolveMediaUrl(media);
          const video = document.getElementById("songVideo");
          if (!video) {
            return;
          }

          if (!mediaUrl) {
            showStatus("No Media URL");
            return;
          }

          video.pause();
          video.removeAttribute("src");
          video.load();
          video.muted = false;
          video.playsInline = true;
          video.autoplay = true;
          video.loop = false;
          video.src = mediaUrl;

          const playResult = video.play();
          if (playResult && typeof playResult.then === "function") {
            playResult
              .then(() => {
                showStatus("");
              })
              .catch(() => {
                showStatus("Tap To Start");
              });
          }

          window.addEventListener(
            "pointerdown",
            () => {
              const retry = video.play();
              if (retry && typeof retry.then === "function") {
                retry
                  .then(() => {
                    showStatus("");
                  })
                  .catch(() => {
                    showStatus("Tap To Start");
                  });
              }
            },
            { passive: true }
          );
        }

        window.addEventListener("DOMContentLoaded", boot);
      })();
    </script>
  </head>
  <body>
    <video id="songVideo" preload="auto" playsinline></video>
    <p id="statusText"></p>
    <div id="screenWipe" class="screen-wipe is-holding" aria-hidden="true"></div>
  </body>
</html>
