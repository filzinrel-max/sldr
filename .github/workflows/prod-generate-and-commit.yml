name: Generate And Commit Assets (prod)

on:
  push:
    branches:
      - prod

permissions:
  contents: write

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate manifests
        run: |
          python tools/build_song_manifest.py
          python tools/build_song_charts.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A game-data
          find songs -type f \( -name '*.mp3' -o -name '*.mp4' \) -print0 | xargs -0 -r git add -f

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore(prod): regenerate song assets [skip ci]"
          git push origin prod
